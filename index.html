<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>D Calculator</title>
        <link rel="stylesheet" href="./styles.css">
        <script src="./scripts.js" defer></script>
    </head>
    <body>
        <h1>Calculator That Calculates!</h1>
        <div id="container">
            <div id="display">0</div>
            <div id="keyboard">
                <button id="ac">AC</button>
                <button id="delete"><=</button>
                <button id="add">+</button>
                <button id="num7">7</button>
                <button id="num8">8</button>
                <button id="num9">9</button>
                <button id="subtract">-</button>
                <button id="num4">4</button>
                <button id="num5">5</button>
                <button id="num6">6</button>
                <button id="multiply">*</button>
                <button id="num1">1</button>
                <button id="num2">2</button>
                <button id="num3">3</button>
                <button id="divide">/</button>
                <button id="negative" disabled><sup>+</sup>/<sub>-</sub></button>
                <button id="zero">0</button>
                <button id="dot" disabled>.</button>
                <button id="equal">=</button>
            </div>
        </div>
    </body>
</html>
